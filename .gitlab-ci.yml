stages:
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

# Cache cargo registry and build artifacts
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - target/

test:
  stage: test
  image: rust:latest
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
    - cargo test

build:
  stage: build
  image: rust:latest
  script:
    - rustup target add x86_64-unknown-linux-gnu
    - cargo build --release --target x86_64-unknown-linux-gnu
    - mkdir -p artifacts
    - cp target/x86_64-unknown-linux-gnu/release/bootc-base-imagectl artifacts/
    - cd artifacts && tar czf bootc-base-imagectl-x86_64-unknown-linux-gnu.tar.gz bootc-base-imagectl
  artifacts:
    paths:
      - artifacts/bootc-base-imagectl-x86_64-unknown-linux-gnu.tar.gz

# Publish binary to GitLab generic package registry on tag
release-package:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file artifacts/bootc-base-imagectl-x86_64-unknown-linux-gnu.tar.gz \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/bootc-base-imagectl/${CI_COMMIT_TAG}/bootc-base-imagectl-x86_64-unknown-linux-gnu.tar.gz"

# Create GitLab release with link to package
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "bootc-base-imagectl-x86_64-unknown-linux-gnu.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/bootc-base-imagectl/${CI_COMMIT_TAG}/bootc-base-imagectl-x86_64-unknown-linux-gnu.tar.gz"
